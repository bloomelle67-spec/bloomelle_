<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloomelle | Masuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#fff8f2',
            sage: '#a9b9a3',
            terracotta: '#c96a5c',
            blush: '#efb6ae',
            charcoal: '#1f2937'
          },
          boxShadow: {
            soft: '0 18px 45px rgba(15, 23, 42, 0.10)',
            glow: '0 24px 60px rgba(201, 106, 92, 0.18)'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://accounts.google.com/gsi/client" defer onload="window.initGoogleOAuth && window.initGoogleOAuth()"></script>
  <style>
    :root { color-scheme: light; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201,106,92,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(169,185,163,0.20), transparent 30%),
        linear-gradient(180deg, #fffaf6, #fff8f2);
      min-height: 100vh;
    }
    
    .glass {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.40);
    }
    
    .hero-card {
      background: linear-gradient(135deg, rgba(201,106,92,0.16), rgba(239,182,174,0.16));
      border: 1px solid rgba(201,106,92,0.14);
    }
    .soft-shadow { box-shadow: 0 24px 60px rgba(15,23,42,0.12); }
    .fade-up { animation: fadeUp 700ms ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .field {
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }
    .field:focus-within {
      border-color: rgba(201,106,92,0.58);
      box-shadow: 0 0 0 4px rgba(201,106,92,0.12);
      transform: translateY(-1px);
    }
    .secret-text {
      -webkit-text-security: disc;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      z-index: 80;
      transition: opacity 260ms ease, transform 260ms ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
  <link rel="stylesheet" href="site.css" />
</head>
<body class="text-slate-800">
  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -left-24 top-16 h-72 w-72 rounded-full bg-[#e8a58f]/20 blur-3xl"></div>
    <div class="absolute right-0 top-44 h-96 w-96 rounded-full bg-[#c96a5c]/15 blur-3xl"></div>
  </div>

  <main class="mx-auto flex min-h-screen max-w-sm items-center px-4 py-6 lg:px-8 lg:py-8">
    <section class="fade-up glass soft-shadow w-full rounded-[28px] p-4 sm:p-5 bg-white/90">
      <div class="flex flex-col items-center text-center">
        <div class="grid h-10 w-10 place-items-center overflow-hidden rounded-full border border-slate-200 bg-white shadow-sm">
          <img src="logo.jpeg" alt="Bloomelle logo" class="h-full w-full rounded-full object-cover" />
        </div>
        <p class="mt-3 text-[11px] font-semibold uppercase tracking-[0.35em] text-terracotta">Welcome back</p>
        <h1 class="mt-2 text-2xl font-black tracking-tight text-charcoal">Login</h1>
      </div>

      <form id="loginForm" class="mt-4 space-y-3" autocomplete="off" novalidate>
        <button id="googleLoginBtn" type="button" class="w-full rounded-2xl border border-slate-200 bg-white px-3 py-3 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-50 flex items-center justify-center gap-3">
          <i class="fa-brands fa-google text-red-500"></i>
          Masuk dengan Google
        </button>
        <div class="flex items-center gap-3 text-[10px] uppercase tracking-[0.3em] text-slate-400">
          <span class="h-px flex-1 bg-slate-200"></span>
          <span>atau</span>
          <span class="h-px flex-1 bg-slate-200"></span>
        </div>
          <label class="block">
            <div class="field mt-2 flex items-center gap-3 rounded-2xl border border-slate-200 bg-white/90 px-3 py-2">
              <i class="fa-regular fa-envelope text-slate-400"></i>
              <input id="email" name="bloomelle-login-email" type="text" inputmode="email" autocomplete="off" autocapitalize="off" spellcheck="false" class="w-full bg-transparent outline-none placeholder:text-slate-400 text-slate-900 text-sm" placeholder="Masukkan akun kamu" />
            </div>
          </label>

          <label class="block">
            <div class="field mt-2 flex items-center gap-3 rounded-2xl border border-slate-200 bg-white/90 px-3 py-2">
              <i class="fa-solid fa-lock text-slate-400"></i>
              <input id="password" name="bloomelle-login-password" type="text" autocomplete="off" class="secret-text w-full bg-transparent outline-none placeholder:text-slate-400 text-slate-900 text-sm" placeholder="Masukkan kunci masuk" />
              <button id="togglePassword" class="text-xs font-bold text-terracotta" type="button">Lihat</button>
            </div>
          </label>

          <div class="flex items-center justify-between gap-4 text-xs">
            <label class="flex items-center gap-2 text-slate-600">
              <input id="rememberMe" type="checkbox" class="h-4 w-4 rounded border-slate-300 text-terracotta focus:ring-terracotta" />
              Ingat saya
            </label>
          </div>

          <p id="errorBox" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700"></p>
          <p id="successBox" class="hidden mt-3 rounded-2xl border border-emerald-300 bg-emerald-100 px-4 py-3 text-sm font-semibold text-emerald-800 shadow-sm">Login berhasil</p>

          <button type="submit" class="mt-3 w-full rounded-2xl bg-terracotta px-4 py-3 font-bold text-white shadow-sm transition hover:-translate-y-0.5 hover:bg-[#bd5649]">Masuk Sekarang</button>
        </form>

        <div class="mt-5 text-center text-sm text-slate-600">
          Belum punya akun? <a href="signup.html" class="font-semibold text-terracotta hover:text-rose-600">Buat akun</a>
        </div>
    </section>
  </main>

  <div id="toast" class="toast rounded-2xl bg-charcoal px-5 py-3 text-sm font-bold text-white shadow-soft" role="status" aria-live="polite">Login berhasil</div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.BloomelleAuth.getAuthUser();
      const redirectRaw = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
      const redirectParam = decodeURIComponent(redirectRaw);
      if (auth) {
        window.location.replace(redirectParam);
        return;
      }

      const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID';
      const form = document.getElementById('loginForm');
      const googleLoginBtn = document.getElementById('googleLoginBtn');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePassword = document.getElementById('togglePassword');
      const rememberMe = document.getElementById('rememberMe');
      const errorBox = document.getElementById('errorBox');
      const successBox = document.getElementById('successBox');
      const toast = document.getElementById('toast');
      let googleTokenClient = null;

      function initGoogleOAuth() {
        if (!window.google || !google.accounts || !google.accounts.oauth2) return;
        googleTokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: 'openid email profile',
          callback: handleGoogleResponse
        });
      }

      window.initGoogleOAuth = initGoogleOAuth;

      function handleGoogleResponse(tokenResponse) {
        if (!tokenResponse || tokenResponse.error) {
          showError('Gagal masuk dengan Google.');
          return;
        }

        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${tokenResponse.access_token}` }
        })
          .then(res => res.json())
          .then(userInfo => {
            if (!userInfo || !userInfo.email) {
              showError('Tidak dapat membaca informasi akun Google.');
              return;
            }
            window.BloomelleAuth.persistAuth({
              email: userInfo.email,
              name: userInfo.name || userInfo.email.split('@')[0]
            }, rememberMe.checked);
            showToast('Berhasil masuk dengan Google');
            window.setTimeout(() => window.location.replace(redirectParam), 450);
          })
          .catch(() => showError('Gagal memproses data Google.'));
      }

      initGoogleOAuth();
      emailInput.value = '';
      passwordInput.value = '';

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove('hidden');
      }

      function clearError() {
        errorBox.textContent = '';
        errorBox.classList.add('hidden');
      }

      function clearSuccess() {
        if (!successBox) return;
        successBox.textContent = '';
        successBox.classList.add('hidden');
      }

      function showToast(message) {
        if (successBox) {
          successBox.textContent = message;
          successBox.classList.remove('hidden');
        }
        toast.textContent = message;
        toast.classList.add('show');
        window.setTimeout(() => toast.classList.remove('show'), 1500);
      }

      if (googleLoginBtn) {
        googleLoginBtn.addEventListener('click', () => {
          if (!googleTokenClient) {
            showError('Google Sign-In tidak tersedia. Pastikan client ID sudah terpasang.');
            return;
          }
          googleTokenClient.requestAccessToken({ prompt: 'select_account' });
        });
      }

      togglePassword.addEventListener('click', () => {
        const isHidden = passwordInput.classList.contains('secret-text');
        passwordInput.classList.toggle('secret-text');
        togglePassword.textContent = isHidden ? 'Sembunyi' : 'Lihat';
      });

      form.addEventListener('submit', event => {
        event.preventDefault();
        clearError();
        clearSuccess();

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          showError('Email dan password wajib diisi.');
          return;
        }

        window.BloomelleAuth.persistAuth({
          email,
          name: email.split('@')[0] || 'Bloomelle User'
        }, rememberMe.checked);

        showToast('Login berhasil');
        window.setTimeout(() => window.location.replace(redirectParam), 450);
      });

    });
  </script>
</body>
</html>
